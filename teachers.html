<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafedra professor-o'qituvchilari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
        }
        .teachers-container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        .teachers-container h2 {
            color: #1e3a8a;
            margin-bottom: 30px;
            font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="teachers-container">
        <h2>Kafedra professor-o'qituvchilari ro'yxati</h2>
        
        <div class="teacher-grid">
            <!-- 1-O'qituvchi -->
            <div class="teacher-card">
                <div class="teacher-avatar">👨‍🏫</div>
                <h3>F. Falsafov</h3>
                <p class="role">Kafedra mudiri</p>
                <p class="degree">Falsafa fanlari nomzodi, PhD</p>
            </div>
            
            <!-- 2-O'qituvchi -->
            <div class="teacher-card">
                <div class="teacher-avatar">👩‍🏫</div>
                <h3>H. Huquqov</h3>
                <p class="role">Katta o'qituvchi</p>
                <p class="degree">Huquqshunoslik mutaxassisi</p>
            </div>

            <!-- 3-O'qituvchi -->
            <div class="teacher-card">
                <div class="teacher-avatar">👨‍🏫</div>
                <h3>A. Ma'naviyatov</h3>
                <p class="role">O'qituvchi</p>
                <p class="degree">Ma'naviyat asoslari mutaxassisi</p>
            </div>
        </div>
    </div>

</body>
</html>
